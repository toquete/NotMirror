<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotMirror</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 24px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.3px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            margin-bottom: 4px;
        }

        .row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus { border-color: #6200ee; }

        input.port-input { width: 80px; flex: none; }

        .buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        button:active { opacity: 0.8; }

        #connect-btn { background: #6200ee; color: #fff; }
        #disconnect-btn { background: #e0e0e0; color: #444; }

        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #555;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #bbb;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .dot.connected  { background: #4caf50; }
        .dot.error      { background: #f44336; }
    </style>
</head>
<body>
    <h1>NotMirror</h1>
    <div class="card">
        <label>Android device address</label>
        <div class="row">
            <input id="ip" type="text" placeholder="192.168.x.x" />
            <input id="port" type="text" class="port-input" value="8765" />
        </div>
        <div class="buttons">
            <button id="connect-btn">Connect</button>
            <button id="disconnect-btn">Disconnect</button>
        </div>
        <div class="status-row">
            <div class="dot" id="dot"></div>
            <span id="status">Not connected</span>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
